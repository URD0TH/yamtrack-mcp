name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/verify.yml
    secrets: inherit

  release-publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    env:
      TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          cache: "npm"

      - name: Verify tag matches package.json version
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$pkg" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $pkg"
            exit 1
          fi

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Build changelog
        id: changelog
        run: |
          prev=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          range="${prev:+$prev..}$TAG"
          repo="${{ github.server_url }}/${{ github.repository }}"
          {
            echo "body<<EOF"
            git log "$range" --no-merges --pretty="- [%h]($repo/commit/%H) %s"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --verify-tag || \
          gh release edit "$TAG" --notes "${{ steps.changelog.outputs.body }}"

      - name: Pack and publish package to GitHub Packages
        run: |
          npm pack
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build provenance attestation
        # ponytail: GPR does not consume npm --provenance; use GitHub Artifact Attestations on the tarball
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "*.tgz"

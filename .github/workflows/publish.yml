name: Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v0.2.0)"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/verify.yml
    secrets: inherit

  release-publish:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || env.TAG }}
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          cache: "npm"

      - name: Bump version (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${TAG#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version "$VERSION" --no-git-tag-version
          sed -i "s/version: \"[0-9.]*\"/version: \"$VERSION\"/" src/index.ts
          sed -i "s/version: \"[0-9.]*\"/version: \"$VERSION\"/" tests/server.test.ts
          git add package.json package-lock.json src/index.ts tests/server.test.ts
          git commit -m "chore: bump version to $VERSION"
          git tag "$TAG"
          git push origin HEAD:"${{ github.ref_name }}"
          git push origin "$TAG"

      - name: Verify tag matches package.json version
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$pkg" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $pkg"
            exit 1
          fi

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Build changelog
        id: changelog
        run: |
          prev=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          range="${prev:+$prev..}$TAG"
          repo="${{ github.server_url }}/${{ github.repository }}"
          {
            echo "body<<EOF"
            git log "$range" --no-merges --pretty="- [%h]($repo/commit/%H) %s"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --verify-tag || \
          gh release edit "$TAG" --notes "${{ steps.changelog.outputs.body }}"

      - name: Pack and publish package to GitHub Packages
        run: |
          npm pack
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate build provenance attestation
        # ponytail: GPR does not consume npm --provenance; use GitHub Artifact Attestations on the tarball
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: "*.tgz"
